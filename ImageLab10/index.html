<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#1f1f1f" scale="2 0.2 1"></a-box>
      <a-box position="-1 0.7 -3" rotation="0 45 0" color="#f5fade" scale="1.75 0.2 0.75"></a-box>
      <a-box position="-1 0.9 -3" rotation="0 45 0" color="#1f1f1f" scale="2 0.2 1"></a-box>

      <a-entity position="3 1 -3">
        <a-cone position="0 0 0" radius-bottom="0.3" radius-top="0.02" height="0.85" rotation="180 0 0" color="#C68642"> </a-cone>
        <a-sphere position="0 0.5 0" radius="0.28" color="#F8C8DC"> </a-sphere>
      </a-entity>
      
      <a-assets>
        <img id="panorama" src="360image.jpg">
      </a-assets>
      <a-sky src="#panorama"></a-sky>
      
    </a-scene>
  </body>
</html>
